# Eino Career Agent 服务端配置文件

# 服务器配置
server:
  port: 8081                          # 服务监听端口
  mode: debug                         # 运行模式: debug / release / test

# 数据库配置
database:
  type: sqlite                        # 数据库类型，当前仅支持 sqlite
  path: ./data/eino_career.db         # SQLite 数据库文件路径

# JWT 配置
jwt:
  secret: "eino-career-agent-secret-change-in-production"  # JWT 签名密钥，生产环境必须修改
  expiration: 72h                     # Token 过期时间

# 文件上传配置
upload:
  max_size: 10485760                  # 文件最大大小（字节），10MB
  allowed_types:                      # 允许的文件类型
    - pdf
    - docx
  storage_path: ./data/uploads        # 文件存储路径

# Agent 配置
agent:
  report_timeout: 360                 # 报告生成超时（秒）
  section_timeout: 120                # 单章节生成超时（秒）
  max_concurrent_sections: 4          # 报告章节最大并行数
  max_history_messages: 50            # 单次对话加载的最大历史消息数

# SSE 配置
sse:
  heartbeat_interval: 15             # 心跳间隔（秒）
